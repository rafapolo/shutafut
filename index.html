<!doctype html>
<html lang="pt">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Empresas Israelenses no Brasil</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Barlow:wght@400&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
        <script src="d3.v7.min.js"></script>
    </head>
    <body>
        <div class="container">
            <!-- Left panel -->
            <div class="left-panel" id="leftPanel">
                <div class="top-controls">
                    <h1>Empresas Israelenses</h1>
                    <h3>no Brasil — sócios e sociedades</h3>

                    <div class="search-wrapper">
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Buscar empresas e sócios…"
                        />
                        <button id="searchClear">×</button>
                    </div>
                    <div id="searchCount"></div>

                    <div class="legend">
                        <div class="legend-item" data-type="company">
                            <div class="legend-dot" style="background:#00c853"></div>
                            <span>Empresa brasileira</span>
                        </div>
                        <div class="legend-item" data-type="israeli_company">
                            <div class="legend-dot" style="background:#0038b8"></div>
                            <span>Empresa israelense</span>
                        </div>
                        <div class="legend-item" data-type="israeli_socio">
                            <div class="legend-dot" style="background:#7eb8f7"></div>
                            <span>Sócio israelense</span>
                        </div>
                        <div class="legend-item" data-type="socio">
                            <div class="legend-dot" style="background:#ffd600"></div>
                            <span>Outro sócio</span>
                        </div>
                    </div>

                    <div class="situacao-filter">
                        <div class="situacao-label">Situação</div>
                        <div id="situacaoChips"></div>
                    </div>

                    <!-- CNAE filter inline (shown after data loads) -->
                    <div id="cnaeFilter">
                        <hr class="panel-divider" />
                        <div class="filter-header">
                            <span style="font-size:14px;font-weight:600;color:#fff">Atividade Econômica</span>
                            <div class="filter-actions">
                                <button class="filter-btn" id="cnaeClearAll">nenhum</button>
                                <button class="filter-btn" id="cnaeSelectAll">todos</button>
                            </div>
                        </div>
                        <input type="text" id="cnaeSearch" placeholder="Buscar CNAE…" />
                        <div id="cnaeList" class="cnae-list"></div>
                    </div>
                </div>
            </div>

            <!-- Floating buttons -->
            <button class="float-btn" id="edgesBrightBtn" title="Destacar arestas">☀</button>
            <button class="float-btn" id="mobileToggle" title="Filtros">⚙</button>

            <div class="loading" id="loading">Carregando rede israelense…</div>

            <!-- Node info panel -->
            <div class="node-info" id="nodeInfo">
                <div class="node-info-header">
                    <h3 id="nodeInfoTitle">Informações do Nó</h3>
                    <div class="node-info-actions">
                        <button id="copyNodeLink" title="Copiar link">🔗</button>
                        <button id="closeNodeInfo">×</button>
                    </div>
                </div>
                <div id="nodeInfoContent">
                    Clique em um nó para ver suas informações e conexões.
                </div>
            </div>

            <canvas id="network-canvas"></canvas>

            <!-- Year timeline slider -->
            <div class="year-timeline" id="yearTimeline">
                <span id="yearValue">todos</span>
                <div class="year-row">
                    <button id="yearExactBtn" class="year-exact-btn" title="Mostrar apenas empresas fundadas neste ano">
                        exatamente em
                    </button>
                    <span class="year-timeline-label" id="yearMin">…</span>
                    <input type="range" id="yearSlider" min="1950" max="2026" value="2026" step="1" />
                    <span class="year-timeline-label" id="yearMax">2026</span>
                </div>
            </div>

            <!-- Panel resize handles (positioned by JS) -->
            <div class="panel-resize-handle" id="leftResizeHandle"></div>
            <div class="panel-resize-handle" id="rightResizeHandle"></div>
            <!-- Panel collapse tabs (positioned by JS) -->
            <button class="panel-tab" id="leftPanelTab" title="Colapsar painel">‹</button>
            <button class="panel-tab" id="rightPanelTab" title="Colapsar painel">›</button>
        </div>

        <script src="cosmograph-viz-israel.js"></script>
        <script src="ui.js"></script>
    </body>
</html>
